services:
  postgres:
    image: postgres:16
    container_name: japa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: japa_sales
      POSTGRES_USER: japa
      POSTGRES_PASSWORD: japa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: japa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: japa-evolution
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: changeme
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
