services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://japa:japa@postgres:5432/japa_sales
      REDIS_URL: redis://redis:6379
      JWT_SECRET: trocar-esta-chave
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLIST_API_BASE_URL: ${OLIST_API_BASE_URL:-}
      OLIST_API_TOKEN: ${OLIST_API_TOKEN:-}
      OLIST_TINY_CLIENT_ID: ${OLIST_TINY_CLIENT_ID:-}
      OLIST_TINY_CLIENT_SECRET: ${OLIST_TINY_CLIENT_SECRET:-}
      OLIST_TINY_REFRESH_TOKEN: ${OLIST_TINY_REFRESH_TOKEN:-}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_TOKEN: ${EVOLUTION_API_TOKEN:-}
      EVOLUTION_INSTANCE: JAPA_ATACADO
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "3333:3333"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
        NEXT_PUBLIC_ENABLE_WHATSAPP: ${NEXT_PUBLIC_ENABLE_WHATSAPP:-false}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
      NEXT_PUBLIC_ENABLE_WHATSAPP: ${NEXT_PUBLIC_ENABLE_WHATSAPP:-false}
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: japa_sales
      POSTGRES_USER: japa
      POSTGRES_PASSWORD: japa
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    profiles: ["whatsapp"]
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_TOKEN:-}
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
